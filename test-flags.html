<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flag SVG Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #0d1117;
            color: white;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .flags-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .flag-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }
        .flag-img {
            width: 60px;
            height: 40px;
            object-fit: cover;
            border-radius: 4px;
        }
        .code {
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Flag SVG Loading Test</h1>
        <p>Testing if SVGs load correctly from /public/assets/flags/</p>
        <div class="flags-grid" id="flagsGrid"></div>
    </div>

    <script>
        const codes = ['jp', 'br', 'us', 'it', 'pl', 'fr', 'rs', 'ar', 'cu', 'ru', 'kr', 'cn', 'de', 'tr', 'ca', 'ir', 'au', 'nl'];
        const grid = document.getElementById('flagsGrid');

        codes.forEach(code => {
            const item = document.createElement('div');
            item.className = 'flag-item';

            const img = document.createElement('img');
            img.src = `/assets/flags/${code}.svg`;
            img.className = 'flag-img';
            img.alt = code;

            const codeLabel = document.createElement('div');
            codeLabel.className = 'code';
            codeLabel.textContent = code.toUpperCase();

            item.appendChild(img);
            item.appendChild(codeLabel);
            grid.appendChild(item);
        });
    </script>
</body>
</html>
